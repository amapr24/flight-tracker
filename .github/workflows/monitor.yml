name: Flight Monitor & Deploy

on:
  workflow_dispatch:  # triggered externally by cron-job.org

permissions:
  contents: write # Important: Allows the bot to commit the index.html

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install flights requests pydantic

      - name: Run monitor
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: python main.py

      - name: Commit and Push index.html
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update flight prices" || echo "No changes to commit"
          git push
